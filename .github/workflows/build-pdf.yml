name: Build PDF and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile PDF with LuaLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: true

      - name: Prepare Pages content
        run: |
          mkdir -p public
          cp main.pdf public/main.pdf
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>SVD</title>
            </head>
            <body>
              <h1>SVD</h1>
              <p><a href="main.pdf">Download the latest PDF</a></p>
              <iframe src="main.pdf" width="100%" height="900" style="border:0;"></iframe>
            </body>
          </html>
          HTML

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: apuntes-pdf
          path: main.pdf
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-pages:
    needs: build-pdf
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
